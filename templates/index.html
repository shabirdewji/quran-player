<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Quran Player</title>

<style>
:root {
    --ayah-font-size: 16px;
}

.ayah {
    font-size: var(--ayah-font-size);
    transition: font-size 0.12s ease;
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 14px;
    background: #15151c;
    border: 1px solid #222;
    line-height: 1.6;
}
.ayah {
    font-size: var(--ayah-font-size);
    transition: font-size 0.12s ease;
}
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, Arial;
    background: #0b0b0f;
    color: white;
    -webkit-tap-highlight-color: transparent;
}

/* TOP BAR (iPhone style) */
header {
    padding: calc(15px + env(safe-area-inset-top));
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    background: #121218;
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid #222;
}

/* SURAH SELECT */
select {
    width: 92%;
    margin: 10px auto;
    display: block;
    padding: 12px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    background: #1c1c24;
    color: white;
    outline: none;
}

select option {
    background: #1c1c24;
    color: white;
}

body.light select {
    background: white;
    color: black;
    border: 1px solid #ddd;
}

body.light select option {
    background: white;
    color: black;
}

/* AYAH CONTAINER */
#ayahWindow {
    height: 65vh;
    overflow-y: auto;
    padding: 15px;
    scroll-behavior: smooth;
}

/* AYAH CARD (iOS style) */

.ayah:active {
    transform: scale(0.98);
}

.ayah-num {
    font-size: inherit;
    opacity: 0.8;
    margin-bottom: 6px;
}

/* HIGHLIGHT */
.active {
    background: #2a2a3a !important;
    border-color: #3a3a55;
}

/* MINI PLAYER */
.player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: grey;
    backdrop-filter: blur(10px);
    padding: 12px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    border-top: 1px solid #222;
}

/* AUDIO */
audio {
    width: 25%;
    outline: none;
}

.bottomBar {
    position: fixed;
    bottom: 70px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    align-items: center;
    background: rgba(18,18,24,0.98);
    backdrop-filter: blur(10px);
    border-top: 1px solid #222;
    padding: 10px;
    z-index: 20;
}

.bottomBar button {
    background: #1c1c24;
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 16px;
}

body.light .bottomBar button {
    background: #f0f0f0;
    color: black;
}

.sliderGroup span {
    color: white;
}

body.light .sliderGroup span {
    color: black;
}

#fontSlider {
    width: 120px;
}

/* LIGHT MODE */
body.light {
    background: #f5f5f5;
    color: #111;
}

body.light .ayah {
    background: white;
    border-color: #ddd;
}

body.light .player,
body.light .bottomBar,
body.light header {
    background: white;
    color: black;
    border-color: #ddd;
}


.progress-bar {
    width: 100%;
    height: 6px;
    background: #e5e5e5;   /* light track */
    border-radius: 999px;
    position: relative;
    cursor: pointer;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: black;     /* black progress */
    border-radius: 999px;
    transition: width 0.1s linear;
}


</style>
</head>

<body>

<header>📖 Quran</header>

<!-- SURAH DROPDOWN -->
<select id="surahSelect" onchange="changeSurah()">
    {% for s in surahs %}
        <option value="{{ loop.index0 }}">
            {{ s.name }} ({{ s.ayah_count }})
        </option>
    {% endfor %}
</select>

<div id="continueCard" style="display:none; padding:10px; background:#222; color:white; margin-bottom:10px; border-radius:8px;">
    <div id="continueText"></div>

    <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
    </div>

    <div id="progressPercent"></div>

    <button onclick="continueListening()" style="margin-top:8px;">
        ▶ Continue Listening
    </button>
</div>

<!-- AYAH WINDOW -->
<div id="ayahWindow"></div>


<script>

let surahs = {{ surahs | tojson }};
let current = 0;
let lastSaved = 0;

let audio;
let ayahElements = [];

function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return `${m}:${s.toString().padStart(2, "0")}`;
}
/* ---------------- SURAH ---------------- */

function changeSurah() {
    const index = document.getElementById("surahSelect").value;
    playSurah(parseInt(index));
}

function playSurah(index) {
    current = index;

    localStorage.setItem("lastSurah", index);

    document.getElementById("continueCard").style.display = "none";

    loadSurah(surahs[index].id);

    audio.src = surahs[index].url;
    audio.play();
}
/* ---------------- AYAH LOAD ---------------- */

async function loadSurah(id) {
    const container = document.getElementById("ayahWindow");

    container.innerHTML = "Loading...";

    const res = await fetch(`/surah/${id}`);
    const ayahs = await res.json();

    container.innerHTML = "";
    ayahElements = [];

    ayahs.forEach((a, index) => {
        const div = document.createElement("div");
        div.className = "ayah";

        div.innerHTML = `
            <div class="ayah-num">${a.ayah}. ${a.text}</div>
        `;

        div.onclick = () => highlight(index);

        container.appendChild(div);
        ayahElements.push(div);
    });
}


function showContinueCard() {
    const surah = localStorage.getItem("resumeSurah");
    const time = parseFloat(localStorage.getItem("resumeTime"));

    if (!surah || isNaN(time) || !surahs[surah]) return;

    const card = document.getElementById("continueCard");
    const text = document.getElementById("continueText");

    card.style.display = "block";

    text.innerText =
        `Continue: ${surahs[surah].name} — ${formatTime(time)}`;

    // load audio metadata to calculate %
    const tempAudio = new Audio(surahs[surah].url);

    tempAudio.addEventListener("loadedmetadata", () => {
        const percent = Math.floor((time / tempAudio.duration) * 100);

        document.getElementById("progressFill").style.width =
            percent + "%";

        document.getElementById("progressPercent").innerText =
            percent + "% completed";
    });
}


function formatProgress() {
    const dur = audio.duration || 0;
    const cur = audio.currentTime || 0;

    if (!dur) return "0%";

    return Math.floor((cur / dur) * 100) + "%";
}

window.addEventListener("DOMContentLoaded", () => {
    const lastSurah = localStorage.getItem("lastSurah");

    if (lastSurah !== null) {
        current = parseInt(lastSurah);
    }

    document.getElementById("surahSelect").value = current;

    loadSurah(surahs[current].id);

    showContinueCard();
});

/* ---------------- SAVE SPOT OF LAST---------------- */

window.addEventListener("DOMContentLoaded", () => {

    audio = document.getElementById("audio");
    const progressBar = document.getElementById("progressBar");
    const progressFill = document.getElementById("progressFill");

    if (!audio || !progressBar || !progressFill) {
        console.error("Player elements missing");
        return;
    }

    // progress update
    audio.addEventListener("timeupdate", () => {
        if (!audio.duration) return;

        const percent = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = percent + "%";
    });

    // click seek
    progressBar.addEventListener("click", (e) => {
        const rect = progressBar.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;

        if (audio.duration) {
            audio.currentTime = percent * audio.duration;
        }
    });

});

function continueListening() {
    const surah = localStorage.getItem("resumeSurah");
    const time = localStorage.getItem("resumeTime");

    if (surah === null) return;
    current = parseInt(surah);
    document.getElementById("surahSelect").value = current;
    loadSurah(surahs[current].id);
    audio.src = surahs[current].url;
    audio.addEventListener("loadedmetadata", () => {
        if (time) {
            audio.currentTime = parseFloat(time);
        }
        audio.play();
    }, { once: true });

    document.getElementById("continueCard").style.display = "none";
}

/* ---------------- HIGHLIGHT ---------------- */

function highlight(index) {
    ayahElements.forEach(el => el.classList.remove("active"));

    const el = ayahElements[index];
    if (!el) return;

    el.classList.add("active");

    el.scrollIntoView({
        behavior: "smooth",
        block: "center"
    });
}

function togglePlay() {
    const btn = document.getElementById("playBtn");

    if (audio.paused) {
        audio.play();
        btn.innerText = "⏸";
    } else {
        audio.pause();
        btn.innerText = "▶";
    }
}

function changeFontSize(size) {
    document.documentElement.style.setProperty('--ayah-font-size', size + 'px');
    localStorage.setItem("fontSize", size);
}


window.addEventListener("DOMContentLoaded", () => {
    const size = localStorage.getItem("fontSize") || 16;

    document.getElementById("fontSlider").value = size;
    changeFontSize(size);
});

function toggleTheme() {
    document.body.classList.toggle("light");

    const isLight = document.body.classList.contains("light");
    localStorage.setItem("theme", isLight ? "light" : "dark");

    document.getElementById("themeBtn").innerText = isLight ? "☀️" : "🌙";
}

window.addEventListener("DOMContentLoaded", () => {
    const theme = localStorage.getItem("theme");

    if (theme === "light") {
        document.body.classList.add("light");
        document.getElementById("themeBtn").innerText = "☀️";
    }
});


</script>

<div class="bottomBar">

    <button onclick="togglePlay()" id="playBtn">▶</button>

    <audio id="audio"></audio>

    <div class="sliderGroup">
        <span>A</span>
        <input type="range" min="14" max="28" value="16" id="fontSlider"
               oninput="changeFontSize(this.value)">
        <span>A</span>
    </div>

    <button onclick="toggleTheme()" id="themeBtn">🌙</button>

</div>

</body>
</html>
