<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Quran Player</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, Arial;
    background: #0b0b0f;
    color: white;
    -webkit-tap-highlight-color: transparent;
}

/* TOP BAR (iPhone style) */
header {
    padding: calc(15px + env(safe-area-inset-top));
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    background: #121218;
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid #222;
}

/* SURAH SELECT */
select {
    width: 92%;
    margin: 10px auto;
    display: block;
    padding: 12px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    background: #1c1c24;
    color: white;
    outline: none;
}

/* AYAH CONTAINER */
#ayahWindow {
    height: 65vh;
    overflow-y: auto;
    padding: 15px;
    scroll-behavior: smooth;
}

/* AYAH CARD (iOS style) */
.ayah {
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 14px;
    background: #15151c;
    border: 1px solid #222;
    transition: 0.2s ease;
    line-height: 1.6;
}

.ayah:active {
    transform: scale(0.98);
}

.ayah-num {
    font-size: 12px;
    opacity: 0.5;
    margin-bottom: 6px;
}

/* HIGHLIGHT */
.active {
    background: #2a2a3a !important;
    border-color: #3a3a55;
}

/* MINI PLAYER */
.player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(18,18,24,0.98);
    backdrop-filter: blur(10px);
    padding: 12px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    border-top: 1px solid #222;
}

/* AUDIO */
audio {
    width: 100%;
    outline: none;
}
</style>
</head>

<body>

<header>📖 Quran</header>

<!-- SURAH DROPDOWN -->
<select id="surahSelect" onchange="changeSurah()">
    {% for s in surahs %}
        <option value="{{ loop.index0 }}">
            {{ s.id }}. {{ s.name }}
        </option>
    {% endfor %}
</select>

<!-- AYAH WINDOW -->
<div id="ayahWindow"></div>

<!-- PLAYER -->
<div class="player">
    <audio id="audio" controls></audio>
</div>

<script>

let surahs = {{ surahs | tojson }};
let current = 0;

let audio = document.getElementById("audio");
let ayahElements = [];

/* ---------------- SURAH ---------------- */

function changeSurah() {
    const index = document.getElementById("surahSelect").value;
    playSurah(parseInt(index));
}

function playSurah(index) {
    current = index;

    loadSurah(surahs[index].id);

    audio.src = surahs[index].url;
    audio.play().catch(() => {
        console.log("Tap play required (iOS safe)");
    });
}

/* ---------------- AYAH LOAD ---------------- */

async function loadSurah(id) {
    const container = document.getElementById("ayahWindow");

    container.innerHTML = "Loading...";

    const res = await fetch(`/surah/${id}`);
    const ayahs = await res.json();

    container.innerHTML = "";
    ayahElements = [];

    ayahs.forEach((a, index) => {
        const div = document.createElement("div");
        div.className = "ayah";

        div.innerHTML = `
            <div class="ayah-num">Ayah ${a.ayah}</div>
            <div>${a.text}</div>
        `;

        div.onclick = () => highlight(index);

        container.appendChild(div);
        ayahElements.push(div);
    });
}

/* ---------------- HIGHLIGHT ---------------- */

function highlight(index) {
    ayahElements.forEach(el => el.classList.remove("active"));

    const el = ayahElements[index];
    if (!el) return;

    el.classList.add("active");

    el.scrollIntoView({
        behavior: "smooth",
        block: "center"
    });
}

/* ---------------- INIT ---------------- */

window.onload = () => {
    playSurah(0);
};

</script>

</body>
</html>
